[llm]
model = "gpt-5-nano"
temperature = 1

[rules.no-hardcoded-secrets]
severity = "error"
prompt = "Check for hardcoded secrets such as API keys, passwords, tokens, private keys, or connection strings. Flag any string literal that looks like a credential, including base64-encoded values and hex strings that resemble keys. Suggest using environment variables or a secret manager instead."

[rules.exported-docstrings]
severity = "warning"
prompt = "Check that every exported function, method, type, and constant has a Go doc comment (a comment starting with the name of the symbol immediately above the declaration). Flag any exported symbol missing its doc comment."
glob = "**/*.go"
